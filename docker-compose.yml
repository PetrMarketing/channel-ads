services:
  db:
    image: postgres:18
    container_name: channel-ads-db
    restart: unless-stopped
    # Лимиты ресурсов: 2 CPU / 4 GiB RAM — для PostgreSQL обычно достаточно
    # под среднюю нагрузку, защищает соседние сервисы от runaway-процесса.
    cpus: 2.0
    mem_limit: 4g
    mem_reservation: 1g
    environment:
      POSTGRES_DB: channel_ads
      POSTGRES_USER: channel_ads
      POSTGRES_PASSWORD: ChAds2026Secure!
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U channel_ads -d channel_ads"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: channel-ads
    restart: unless-stopped
    # Лимиты ресурсов: 2 CPU / 2 GiB RAM — FastAPI приложение, обычно укладывается
    # в 200-500 MiB, лимит ставим с запасом под пики и долгие фоновые задачи.
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 256m
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8010:8000"
    env_file:
      - ./backend-python/.env
    environment:
      - NODE_ENV=production
      - PORT=8000
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=postgresql://channel_ads:ChAds2026Secure!@db:5432/channel_ads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: channel-ads-rtmp
    restart: unless-stopped
    # Лимиты ресурсов: 4 CPU / 1 GiB RAM — nginx-rtmp + HLS-сегментация,
    # 4 ядра под параллельные транскодирования и раздачу зрителям.
    cpus: 4.0
    mem_limit: 1g
    mem_reservation: 128m
    ports:
      - "1935:1935"            # RTMP — публично для OBS
      - "127.0.0.1:8081:8081"  # HLS — внутри (прокидывается через app)
    volumes:
      - ./rtmp/nginx.conf:/etc/nginx/nginx.conf:ro
      - rtmp_hls:/tmp/hls
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  uploads_data:
  pg_data:
  rtmp_hls:
