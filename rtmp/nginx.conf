worker_processes auto;
events { worker_connections 1024; }

# RTMP сервер для приёма потоков из OBS и трансляции через HLS
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # Включить HLS — сегменты для воспроизведения в браузере
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
            hls_playlist_length 30s;
            hls_cleanup on;

            # Разрешаем publish из любого источника (валидация по ключу — в callback)
            allow publish all;
            allow play all;

            # Хук валидации ключа: nginx делает HTTP POST на бэкенд
            # с параметром name=<stream_key>. Бэкенд проверяет существование
            # эфира с таким ключом и status=scheduled/live и возвращает 2xx.
            on_publish http://app:8000/api/streams/rtmp-auth;
            on_publish_done http://app:8000/api/streams/rtmp-done;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    default_type application/octet-stream;

    server {
        listen 8081;

        # Раздаём HLS-сегменты по HTTP
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Статистика RTMP (опционально)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
