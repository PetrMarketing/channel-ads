# max.pkmarketing.ru — Channel Ads (FastAPI + React SPA)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name max.pkmarketing.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://max.pkmarketing.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    access_log /var/log/nginx/max_pkmarketing_ru_access.log main;
    server_name max.pkmarketing.ru;

    ssl_certificate /etc/letsencrypt/live/max.pkmarketing.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/max.pkmarketing.ru/privkey.pem;

    client_max_body_size 50M;

    # WAF
    if ($block_request) { return 403; }
    access_log /var/log/nginx/max_pkmarketing_ru_blocked.log blocked if=$block_request;

    # Override global security headers for mini-app compatibility (MAX WebView)
    # Allow embedding in MAX messenger frames
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header X-Content-Type-Options;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://st.max.ru https://fonts.googleapis.com https://fonts.gstatic.com https://mc.yandex.ru https://mc.yandex.com https://yastatic.net https://smartcaptcha.yandexcloud.net https://vk.com https://*.vk.com https://connect.facebook.net https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://smartcaptcha.yandexcloud.net; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' data: blob: https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.ru wss://mc.yandex.com https://smartcaptcha.yandexcloud.net https://api.vk.com https://*.vk.com https://www.google-analytics.com https://api-metrika.yandex.net https://land.pkmarketing.ru https://max.pkmarketing.ru; media-src 'self'; object-src 'none'; child-src 'self' https://mc.yandex.com https://mc.yandex.ru https://smartcaptcha.yandexcloud.net https://vk.com https://*.vk.com https://rutube.ru https://*.rutube.ru; frame-src 'self' https://mc.yandex.com https://mc.yandex.ru https://smartcaptcha.yandexcloud.net https://vk.com https://*.vk.com https://rutube.ru https://*.rutube.ru; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self' https://land.pkmarketing.ru; frame-ancestors https://*.max.ru https://max.ru https://web.max.ru; upgrade-insecure-requests;" always;

    # Uploads — static files
    location /uploads/ {
        proxy_pass http://127.0.0.1:8010/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Webhook endpoints
    location /webhook/ {
        proxy_pass http://127.0.0.1:8010/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8010/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Short link redirects
    location /go/ {
        proxy_pass http://127.0.0.1:8010/go/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot deep link redirect
    location /bot/ {
        proxy_pass http://127.0.0.1:8010/bot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8010/health;
        proxy_set_header Host $host;
    }

    # Everything else → FastAPI (serves SPA)
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
