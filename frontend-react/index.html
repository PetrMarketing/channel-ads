    <script type="application/ld+json">

      "url": "https://itcakes.ru",

        "lowPrice": "490",
        "highPrice": "3990",
        "offerCount": "4"

      "featureList": [
        "Трекинг рекламных ссылок с UTM-метками",

        "@type": "Organization",

        "url": "https://pkmarketing.ru"
      }
    }
